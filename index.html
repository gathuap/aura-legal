<style>

  .container {

    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-weight: 600;
    transition: background 0.2s;
  }
  .links a:hover { background: #0E7C6B; }
  .links a.secondary { background: white; color: #0B1D3A; border: 2px solid #E2E8F0; }
  .links a.secondary:hover { border-color: #0E7C6B; color: #0E7C6B; }
  .footer {
    margin-top: 32px;
    font-size: 12px;
    color: #6B7B8D;
  }
  .badge {
    display: inline-block;
    background: rgba(14, 124, 107, 0.1);
    color: #0E7C6B;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 600;
